<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Decision Helper</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>


<header>
    <h2>Decision Helper</h2>
</header>

<main>
    <section class="intro">
    <h1>Not sure what to choose?</h1>
    <p>Let the system help you decide smarter.</p>
    </section>

    <section class="search">
        <input type="text" placeholder="What are you trying to decide?">
        <button>Search</button>
    </section>

    <section class="domain">
        <button>Accessories</button>
        <button>Education</button>
        <button>Food</button>
        <button>Games</button>
        <button>Travel</button>
        <button>Gadgets</button>
    </section>


    <section class="best">
        <h3>Best Choice</h3>
        <div class="card">
            <p>No data yet</p>
        </div>
    </section>

        <section class="results" id="results">
        </section>
</main>
<script src="script.js"></script>

</body>
</html>
