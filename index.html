<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Decision Helper</title>
<link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Macondo&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
<body>


<header>
    <h2>Decision Helper</h2>
</header>

<main>
    <section class="intro">
    <h1>Not sure what to choose?</h1>
    <p>Let the system help you decide smarter.</p>
    </section>

    <section class="search">
        <select id = "sort">
            <option value="sort">Sort</option>
            <option value="priceLow">Price (low to high)</option>
            <option value="priceHigh">Price (high to low)</option>
            <option value="rating">Rating (high to low)</option>
        </select>

        <input type="text" placeholder="What are you trying to decide?">
        <button>Search</button>
    </section>

    <section class="domain">
        <button>Accessories</button>
        <button>Education</button>
        <button>Food</button>
        <button>Games</button>
        <button>Gadgets</button>
    </section>


    <section class="best">
        <h3>Best Choice</h3>
        <div class="card">
            <p>No data yet</p>
        </div>
    </section>

        <section class="results" id="results">
        </section>
</main>
<script src="script.js"></script>

</body>
</html>
